<div class="metric-card">
  <div class="metric-card__label">{{ label() }}</div>
  <div class="metric-card__value" [style.color]="accent()">
    {{ value() }}@if (unit()) {<span class="metric-card__unit">{{ unit() }}</span>}
  </div>
  @if (sub()) {
    <div class="metric-card__sub" [style.color]="accent()">{{ sub() }}</div>
  }
</div>
